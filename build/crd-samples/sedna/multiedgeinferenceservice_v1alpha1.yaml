apiVersion: sedna.io/v1alpha1
kind: MultiEdgeInferenceService
metadata:
  name: pedestrian-reid
  namespace: default
spec:
  workers:
  - workerSpec:
    metadata:
      workerName: "dataLoadWoker0"
    spec:
      containers: 
        image: kubeedge/sedna-example-multi-edge-inference-reid-dataLoad:v0.1.0
        env:
        - name: "cameras"
          value: [192.168.0.10,192.168.0.11]
        - name: "modelUri"
          value: "http://103.124.124.134/RPpredictor_v1.0.tar.gz"
  - workerSpec:
    metadata:
      workerName: "dataLoadWoker1"
    spec:
      containers: 
        image: kubeedge/sedna-example-multi-edge-inference-reid-dataLoad:v0.1.0
        env:
        - name: "cameras"
          value: [192.168.0.12,192.168.0.13]
        - name: "modelUri"
          value: "http://103.124.124.134/RPpredictor_v1.0.tar.gz"
  - workerSpec:
    metadata:
      workerName: "decisionMaker"
    spec:
      containers:
        image: kubeedge/sedna-example-multi-edge-inference-reid-decision-maker:v0.1.0
  - workerSpec:
    metadata:
      workerName: "detect-and-match"
    spec:
      containers:
        image: kubeedge/sedna-example-multi-edge-inference-reid-detect-and-match:v0.1.0
        env:
        - name: "detectorModelUri"
          value: "http://103.124.124.134/detector_v1.0.tar.gz"
        - name: "matcherModelUri"
          value: "http://103.124.124.134/matcher_v1.0.tar.gz"
      replicas: 5
  graph:
      name: "decisionMaker"
      endpoint:
        type: IP
      children:
        - spec:
          name: "dataLoadWoker0"
          endpoint:
            type: HTTP
          children:
            - spec:
              name: "detect-and-match"
              endpoint:
              type: HTTP
        - spec:
          name: "dataLoadWoker1"
          endpoint:
            type: HTTP
          children:
            - spec:
              name: "detect-and-match"
              endpoint:
              type: HTTP
